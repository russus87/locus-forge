name: build

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Arch Linux — produces locus-forge-<ver>-1-x86_64.pkg.tar.zst
  # (l'artefatto che russus-launcher installa)
  # ---------------------------------------------------------------------------
  arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install toolchain & deps
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git rust nodejs npm \
            webkit2gtk-4.1 gtk3 libappindicator-gtk3 \
            patchelf openssl sudo curl tar

      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(node -p "require('./package.json').version")"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build frontend + binary
        run: |
          npm ci
          npx tauri build --no-bundle

      - name: Stage package artifacts
        run: |
          mkdir -p pkgstage
          cp src-tauri/target/release/locus-forge pkgstage/locus-forge
          cp packaging/locus-forge.desktop pkgstage/locus-forge.desktop
          cp packaging/PKGBUILD pkgstage/PKGBUILD
          cp src-tauri/icons/128x128.png      pkgstage/icon-128.png
          cp src-tauri/icons/128x128@2x.png   pkgstage/icon-256.png
          cp src-tauri/icons/icon.png         pkgstage/icon-512.png
          sed -i "s/^pkgver=.*/pkgver=${{ steps.ver.outputs.version }}/" pkgstage/PKGBUILD

      - name: makepkg (.pkg.tar.zst)
        run: |
          useradd -m builder
          chown -R builder pkgstage
          cd pkgstage
          sudo -u builder makepkg -f --noconfirm
          ls -1 *.pkg.tar.zst

      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: pkgstage/*.pkg.tar.zst

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: pkgstage/*.pkg.tar.zst
