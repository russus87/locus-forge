name: build-forge

# Compila Locus Forge (Tauri v2) su Linux, Windows e macOS (Intel + Apple Silicon).
# - push su main / workflow_dispatch → build + artefatti scaricabili dalla run.
# - push di un tag v* → crea una GitHub Release (draft) con gli installer allegati.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write        # serve a tauri-action per creare la release sui tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macos-x64
          - platform: ubuntu-22.04
            args: ''
            name: linux
          - platform: windows-latest
            args: ''
            name: windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential curl wget file libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tagName vuoto = solo build (nessuna release); valorizzato solo sui tag v*
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'Locus Forge __VERSION__' || '' }}
          releaseDraft: true
          releaseBody: 'Installer generati automaticamente dalla CI.'
          args: ${{ matrix.args }}

      - name: Upload build artifacts (build non-release)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: locus-forge-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*
            src-tauri/target/*/release/bundle/**/*
          if-no-files-found: ignore
